version: '3.8'

x-app-src: &app-src
  volumes:
    - ./src:/var/www/html

services:
  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    ports:
      - "89:80"
      - "543:443"
    depends_on:
      - mysql
      - mongo
      - php
    restart: unless-stopped
    <<: *app-src

  mysql:
    image: mariadb:10.5
    ports:
      - "3316:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./etc/mysql:/var/lib/mysql
    restart: unless-stopped

  # Primary datastore for the readings. Locally this replaces MongoDB Atlas so the
  # API can serve data with zero cloud credentials.
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: php.dockerfile
    # Run php-fpm as the host user so files written to the bind-mounted
    # ./src (storage/logs, bootstrap/cache) stay host-owned and writable.
    user: "${PHPUID:-1000}:${PHPGID:-1000}"
    restart: unless-stopped
    ports:
      - 8010:9000
    <<: *app-src

  composer:
    build:
      context: .
      dockerfile: php.dockerfile
    working_dir: /var/www/html
    user: "${PHPUID:-1000}:${PHPGID:-1000}"
    environment:
      - HOME=/tmp
    entrypoint: ["composer"]
    <<: *app-src

  npm:
    image: node:current-alpine
    entrypoint: ["npm"]
    working_dir: /var/www/html
    
  artisan:
    build:
      context: .
      dockerfile: php.dockerfile
    working_dir: /var/www/html
    user: "${PHPUID:-1000}:${PHPGID:-1000}"
    depends_on:
      - mysql
      - mongo
    entrypoint: ["php", "/var/www/html/artisan"]
    <<: *app-src

volumes:
  mongo-data: